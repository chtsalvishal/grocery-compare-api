services:
  - type: web
    name: grocery-compare-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DB_PATH
        value: /data/specials.db
    disk:
      name: specials-db
      mountPath: /data
      sizeGB: 1
